name: CI

on:
  push:
    branches: ['**']

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Poetry
        run: pip install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run smoke tests
        run: poetry run pytest tests/smoke/ -v

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Poetry
        run: pip install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run unit tests
        run: poetry run pytest tests/unit/ -v

  system-tests:
    name: System Tests
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Poetry
        run: pip install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install --with dev

      - name: Install FFmpeg and Ghostscript
        run: sudo apt-get update && sudo apt-get install -y ffmpeg ghostscript

      - name: Run system tests
        run: poetry run pytest tests/system/ -v

  code-quality:
    name: Code Quality (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Poetry
        run: pip install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install --with ci

      - name: Check code formatting with Ruff
        run: poetry run ruff format --check filesqueeze/ tests/

      - name: Lint with ruff
        run: poetry run ruff check filesqueeze/ tests/ --select=E9,F63,F7,F82 --output-format=concise

      - name: Check type annotations with Ruff
        run: poetry run ruff check filesqueeze/ tests/ --select=ANN --output-format=concise

