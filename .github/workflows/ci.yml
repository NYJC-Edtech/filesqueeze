  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Poetry
        run: pip install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install --with dev,ci

      - name: Install FFmpeg and Ghostscript
        run: sudo apt-get update && sudo apt-get install -y ffmpeg ghostscript

      - name: Run coverage
        run: |
          poetry run pytest tests/unit/ tests/smoke/ tests/system/ \
            --cov=filesqueeze \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-report=html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false